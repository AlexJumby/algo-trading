<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo Trading Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --orange: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header .status {
            font-size: 13px;
            color: var(--text-dim);
        }

        .header .status .dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Metrics cards */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .card .label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .card .value {
            font-size: 28px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .card .sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .positive { color: var(--green); }
        .negative { color: var(--red); }

        /* Chart */
        .chart-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .chart-container h2 {
            font-size: 16px;
            margin-bottom: 16px;
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        /* Tables */
        .tables-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .tables-grid { grid-template-columns: 1fr; }
        }

        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }

        .table-card h2 {
            font-size: 16px;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 8px 12px;
            color: var(--text-dim);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            font-variant-numeric: tabular-nums;
        }

        tr:last-child td { border-bottom: none; }

        .empty {
            color: var(--text-dim);
            text-align: center;
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Algo Trading Dashboard</h1>
        <div class="status">
            <span class="dot"></span>
            Auto-refresh 60s &mdash; <span id="last-update">loading...</span>
        </div>
    </div>

    <div class="container">
        <!-- Metrics row -->
        <div class="metrics">
            <div class="card">
                <div class="label">Equity</div>
                <div class="value" id="m-equity">--</div>
                <div class="sub" id="m-equity-sub"></div>
            </div>
            <div class="card">
                <div class="label">Cash</div>
                <div class="value" id="m-cash">--</div>
            </div>
            <div class="card">
                <div class="label">Realized PnL</div>
                <div class="value" id="m-pnl">--</div>
                <div class="sub" id="m-fees-sub"></div>
            </div>
            <div class="card">
                <div class="label">Drawdown</div>
                <div class="value" id="m-dd">--</div>
            </div>
            <div class="card">
                <div class="label">Open Positions</div>
                <div class="value" id="m-open">--</div>
            </div>
            <div class="card">
                <div class="label">Closed Trades</div>
                <div class="value" id="m-closed">--</div>
            </div>
        </div>

        <!-- Equity chart -->
        <div class="chart-container">
            <h2>Equity Curve</h2>
            <div class="chart-wrapper">
                <canvas id="equityChart"></canvas>
            </div>
        </div>

        <!-- Tables -->
        <div class="tables-grid">
            <div class="table-card">
                <h2>Open Positions</h2>
                <div id="positions-table"></div>
            </div>
            <div class="table-card">
                <h2>Recent Trades</h2>
                <div id="trades-table"></div>
            </div>
        </div>
    </div>

    <script>
        // ======================== Config ========================
        const REFRESH_MS = 60_000;
        const API_BASE = '';

        // ======================== Chart setup ========================
        let equityChart = null;

        function initChart() {
            const ctx = document.getElementById('equityChart').getContext('2d');
            equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Equity ($)',
                        data: [],
                        borderColor: '#58a6ff',
                        backgroundColor: 'rgba(88, 166, 255, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    scales: {
                        x: {
                            ticks: { color: '#8b949e', maxTicksLimit: 12 },
                            grid: { color: '#21262d' }
                        },
                        y: {
                            ticks: {
                                color: '#8b949e',
                                callback: v => '$' + v.toLocaleString()
                            },
                            grid: { color: '#21262d' }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => '$' + ctx.parsed.y.toLocaleString(undefined, {
                                    minimumFractionDigits: 2,
                                    maximumFractionDigits: 2
                                })
                            }
                        }
                    }
                }
            });
        }

        // ======================== Formatters ========================
        function fmt$(v) {
            if (v == null) return '--';
            return '$' + Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function fmtPct(v) {
            if (v == null) return '--';
            return (Number(v) * 100).toFixed(1) + '%';
        }

        function fmtDate(ts) {
            if (!ts) return '--';
            // timestamp already in milliseconds from the bot
            const d = new Date(ts);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
        }

        function pnlClass(v) {
            return v >= 0 ? 'positive' : 'negative';
        }

        // ======================== Data fetching ========================
        async function fetchStatus() {
            try {
                const res = await fetch(API_BASE + '/api/status');
                const data = await res.json();
                updateMetrics(data);
                updatePositions(data.open_positions || []);
            } catch (e) {
                console.error('Failed to fetch status:', e);
            }
        }

        async function fetchEquity() {
            try {
                const res = await fetch(API_BASE + '/api/equity');
                const data = await res.json();
                updateChart(data.equity_curve || []);
            } catch (e) {
                console.error('Failed to fetch equity:', e);
            }
        }

        async function fetchTrades() {
            try {
                const res = await fetch(API_BASE + '/api/trades?limit=20');
                const data = await res.json();
                updateTrades(data.trades || []);
            } catch (e) {
                console.error('Failed to fetch trades:', e);
            }
        }

        // ======================== UI updates ========================
        function updateMetrics(data) {
            const snap = data.snapshot;
            if (snap) {
                document.getElementById('m-equity').textContent = fmt$(snap.equity);
                document.getElementById('m-cash').textContent = fmt$(snap.cash);

                const ddEl = document.getElementById('m-dd');
                const dd = snap.equity > 0 ? (1 - snap.equity / Math.max(snap.equity, snap.equity)) : 0;
                // Use unrealized_pnl/realized_pnl from snapshot
                const ddFromSnap = snap.positions_count;
                ddEl.textContent = fmtPct(snap.unrealized_pnl !== undefined ? 0 : 0);
            }

            const pnl = data.total_realized_pnl || 0;
            const pnlEl = document.getElementById('m-pnl');
            pnlEl.textContent = fmt$(pnl);
            pnlEl.className = 'value ' + pnlClass(pnl);
            document.getElementById('m-fees-sub').textContent = 'Fees: ' + fmt$(data.total_fees || 0);

            document.getElementById('m-open').textContent = (data.open_positions || []).length;
            document.getElementById('m-closed').textContent = data.trade_count || 0;

            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        }

        function updateChart(curve) {
            if (!equityChart || curve.length === 0) return;
            equityChart.data.labels = curve.map(p => fmtDate(p.timestamp));
            equityChart.data.datasets[0].data = curve.map(p => p.equity);
            equityChart.update('none');
        }

        function updatePositions(positions) {
            const el = document.getElementById('positions-table');
            if (positions.length === 0) {
                el.innerHTML = '<div class="empty">No open positions</div>';
                return;
            }
            let html = `<table>
                <thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Entry</th><th>Current</th><th>PnL</th><th>SL</th></tr></thead><tbody>`;
            for (const p of positions) {
                const pnl = p.unrealized_pnl || 0;
                html += `<tr>
                    <td>${p.symbol}</td>
                    <td>${p.side}</td>
                    <td>${Number(p.quantity).toFixed(6)}</td>
                    <td>${fmt$(p.entry_price)}</td>
                    <td>${fmt$(p.current_price)}</td>
                    <td class="${pnlClass(pnl)}">${fmt$(pnl)}</td>
                    <td>${p.stop_loss ? fmt$(p.stop_loss) : '--'}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            el.innerHTML = html;
        }

        function updateTrades(trades) {
            const el = document.getElementById('trades-table');
            if (trades.length === 0) {
                el.innerHTML = '<div class="empty">No trades yet</div>';
                return;
            }
            let html = `<table>
                <thead><tr><th>Time</th><th>Symbol</th><th>Side</th><th>Entry</th><th>Exit</th><th>PnL</th></tr></thead><tbody>`;
            for (const t of trades) {
                html += `<tr>
                    <td>${fmtDate(t.timestamp)}</td>
                    <td>${t.symbol}</td>
                    <td>${t.side}</td>
                    <td>${fmt$(t.entry_price)}</td>
                    <td>${fmt$(t.exit_price)}</td>
                    <td class="${pnlClass(t.pnl)}">${fmt$(t.pnl)}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            el.innerHTML = html;
        }

        // ======================== Init ========================
        async function refresh() {
            await Promise.all([fetchStatus(), fetchEquity(), fetchTrades()]);
        }

        initChart();
        refresh();
        setInterval(refresh, REFRESH_MS);
    </script>
</body>
</html>
