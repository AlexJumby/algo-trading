exchange:
  name: bybit
  api_key: ""                    # Set via BYBIT_API_KEY env var or fill in here
  api_secret: ""                 # Set via BYBIT_API_SECRET env var or fill in here
  testnet: true                  # ALWAYS start with testnet
  rate_limit: true

pairs:
  - symbol: "BTC/USDT:USDT"     # Bybit USDT perpetual
    market_type: futures
    timeframe: "1h"
    leverage: 7                  # Optimized: 7x leverage for TSMOM

  - symbol: "ETH/USDT:USDT"
    market_type: futures
    timeframe: "1h"
    leverage: 7                  # Same as BTC — validated on ETH OOS (+141.5%)

# --- TSMOM Strategy (Time-Series Momentum + Volatility Management) ---
# Optimized via 2-stage grid search on 730 days mainnet BTC/USDT 1h data
# Results: +70.9% total (~35%/yr), Sharpe 1.09, Max DD 23%, 120 trades, PF 1.56
strategy:
  name: tsmom
  params:
    # Volatility mode: "simple" (rolling std) or "ewma" (exponentially weighted)
    vol_mode: "ewma"
    # Multi-period momentum lookback (hours)
    roc_short: 48                 # 2-day momentum
    roc_medium: 336               # 14-day momentum
    roc_long: 1440                # 60-day momentum (strongest signal)
    # Momentum weights — heavily weighted toward long-term trend
    w_short: 0.16
    w_medium: 0.24
    w_long: 0.60
    # Entry threshold — composite score must exceed 2%
    entry_threshold: 0.02
    # Volatility targeting — scale positions to 50% annual vol
    vol_lookback: 336             # 14-day realized vol window
    target_vol: 0.50
    max_vol_scalar: 3.0
    min_vol_scalar: 0.2
    # ADX trend filter — only trade when trending
    adx_period: 14
    adx_threshold: 22
    # Trend EMA — directional filter
    trend_ema: 400                # ~17 days
    # ATR stop-loss
    atr_period: 14
    atr_sl_mult: 3.0             # Wide stop: 3x ATR
    # ATR trailing stop — let winners run
    trailing_atr_mult: 3.5
    # Cooldown after close
    cooldown_bars: 24             # 1 day cooldown
    # Lookback window for indicators
    lookback_bars: 1640
    # Regime filter — skip entries in choppy markets
    regime_enabled: true
    regime_period: 14
    regime_threshold: 0.4

risk:
  max_position_size_pct: 0.15    # 15% of equity per trade (leveraged: 15% * 7x = 105% notional)
  max_open_positions: 3
  max_drawdown_pct: 0.25         # Halt at 25% drawdown
  default_stop_loss_pct: 0.03
  default_take_profit_pct: 0.06
  position_sizing_method: "fixed_fraction"
  max_leverage_exposure: 5.0     # Hard cap: max notional/equity per position
  drawdown_soft_pct: 0.10        # Start gradual deleveraging at 10% DD

backtest:
  start_date: "2024-03-01"
  end_date: "2026-03-01"
  initial_capital: 10000.0
  # Legacy fees (used if maker/taker not set)
  commission_pct: 0.001
  slippage_pct: 0.0005
  # Realistic fee model (Bybit VIP0)
  maker_fee_pct: 0.0002         # 0.02% maker
  taker_fee_pct: 0.00055        # 0.055% taker
  slippage_base_pct: 0.0003     # Base slippage 0.03%
  slippage_impact_pct: 0.0002   # +0.02% per $100k notional
  # Perpetual funding rate
  funding_rate_pct: 0.0001      # 0.01% per 8h (default Bybit)
  funding_interval_hours: 8

log_level: "INFO"
