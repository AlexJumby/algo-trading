services:
  bot:
    build: .
    container_name: algo-trading-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Config — монтируем свой конфиг внутрь контейнера
      - ./config/settings.yaml:/app/config/settings.yaml:ro
      # Data и логи — сохраняются между рестартами
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["scripts/run_live.py", "--mode", "paper"]
    # Для live торговли замени на:
    # command: ["scripts/run_live.py", "--mode", "live"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: algo-trading-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Shared DB — бот пишет, дашборд читает (WAL mode)
      - ./data:/app/data:ro
    environment:
      - PORTFOLIO_DB_PATH=data/portfolio.db
    depends_on:
      - bot
